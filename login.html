<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>Sign In — CableTrack</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 50px white inset !important;
        -webkit-text-fill-color: #1e293b !important;
    }
  </style>
</head>

<body class="overflow-hidden font-sans" style="background: radial-gradient(at 0% 0%, #1e293b 0%, #0f172a 100%);">
  
  <div class="fixed inset-0 flex items-center justify-center z-[9999] transition-all duration-700">
    <!-- Perspective Decorative Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[100px] animate-pulse"></div>
      <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[100px] animate-pulse" style="animation-delay: 1s;"></div>
      <!-- Grid Overlay -->
      <div class="absolute inset-0 opacity-[0.03]" 
           style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 50px 50px;"></div>
    </div>

    <div class="relative w-full max-w-[440px] px-6 animate-fadeInUp">
      <div class="bg-white/95 backdrop-blur-2xl rounded-[32px] shadow-2xl border border-white/20 overflow-hidden relative group">
        <!-- Glow effect on hover -->
        <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-blue-600 opacity-0 group-hover:opacity-10 transition-opacity duration-500 rounded-[32px] blur"></div>
        
        <div class="relative bg-white rounded-[31px]">
          <!-- Brand Header -->
          <div class="pt-10 pb-6 text-center">
              <div class="inline-flex w-24 h-24 rounded-3xl bg-slate-50 p-4 border border-slate-100 shadow-sm mb-6 mx-auto group-hover:scale-110 transition-transform duration-500">
                  <i data-lucide="zap" class="w-full h-full text-indigo-600 object-contain"></i>
              </div>
              <h1 class="text-2xl font-black text-slate-800 tracking-tight uppercase">CableTrack</h1>
              <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.3em] mt-1.5 opacity-80">Ranga Electricals Pvt Ltd</p>
          </div>

          <div class="px-10 pb-10">
              <!-- Alert Display -->
              <div id="login-error" class="hidden mb-6 px-4 py-3.5 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 text-red-600">
                  <div class="w-8 h-8 shrink-0 rounded-full bg-white flex items-center justify-center shadow-sm">
                      <i data-lucide="alert-circle" class="w-4 h-4 text-red-600"></i>
                  </div>
                  <p class="text-[11px] font-black uppercase tracking-tight" id="login-error-msg">Authentication Failed</p>
              </div>

              <form id="login-form" class="space-y-5">
                  <div class="space-y-1.5">
                      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                      <div class="relative group/field">
                          <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within/field:text-indigo-500 transition-colors">
                              <i data-lucide="user" class="w-5 h-5"></i>
                          </div>
                          <input type="text" id="username" placeholder="Username" required autocomplete="username"
                              class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-bold text-slate-800 placeholder:text-slate-300 outline-none focus:border-indigo-500/20 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all" />
                      </div>
                  </div>

                  <div class="space-y-1.5">
                      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Credentials</label>
                      <div class="relative group/field">
                          <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within/field:text-indigo-500 transition-colors">
                              <i data-lucide="lock" class="w-5 h-5"></i>
                          </div>
                          <input type="password" id="password" placeholder="Password" required autocomplete="current-password"
                              class="w-full pl-12 pr-12 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl text-sm font-bold text-slate-800 placeholder:text-slate-300 outline-none focus:border-indigo-500/20 focus:bg-white focus:ring-4 focus:ring-indigo-500/5 transition-all" />
                          <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-2 transition-colors">
                              <i data-lucide="eye" id="pw-eye-icon" class="w-5 h-5"></i>
                          </button>
                      </div>
                  </div>

                  <div class="pt-2">
                      <button type="submit" id="login-btn"
                          class="w-full py-4 rounded-2xl bg-slate-900 text-white font-black text-sm flex items-center justify-center gap-3 shadow-xl shadow-slate-900/10 hover:shadow-2xl hover:shadow-indigo-500/20 hover:bg-indigo-600 active:scale-[0.98] transition-all group/btn">
                          <span id="login-btn-text">Establish Connection</span>
                          <i data-lucide="arrow-right" id="login-icon" class="w-5 h-5 transition-transform group-hover/btn:translate-x-1"></i>
                      </button>
                  </div>
              </form>

              <div class="mt-8 pt-8 border-t border-slate-100">
                  <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider text-center mb-4 opacity-60">Developer/Test Access</p>
                  <div class="grid grid-cols-2 gap-3">
                      <button type="button" onclick="window._quickLogin('admin','admin123')"
                          class="py-2.5 rounded-xl bg-slate-50 text-slate-600 font-black text-[10px] uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-colors">Admin</button>
                      <button type="button" onclick="window._quickLogin('viewer','viewer123')"
                          class="py-2.5 rounded-xl bg-slate-50 text-slate-600 font-black text-[10px] uppercase tracking-widest border border-slate-100 hover:bg-slate-100 transition-colors">Viewer</button>
                  </div>
              </div>
          </div>
        </div>
      </div>
      
      <p class="mt-8 text-center text-[10px] font-bold text-slate-500 uppercase tracking-widest opacity-40">
          &copy; 2024 Ranga Electricals &bull; Secure Protocol
      </p>
    </div>
  </div>

  <div id="toast-wrap" class="toast toast-top toast-end z-50"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });

    // Redirect if already signed in
    try {
      const s = JSON.parse(localStorage.getItem(CONFIG.SESSION_KEY));
      if (s?.token) window.location.replace('dashboard.html');
    } catch {}

    let pwdVisible = false;
    document.getElementById('toggle-password').addEventListener('click', () => {
      pwdVisible = !pwdVisible;
      const p  = document.getElementById('password');
      const ic = document.getElementById('pw-eye-icon');
      p.type = pwdVisible ? 'text' : 'password';
      ic.setAttribute('data-lucide', pwdVisible ? 'eye-off' : 'eye');
      if (window.lucide) lucide.createIcons({ nodes: [ic.parentElement] });
    });

    window._quickLogin = (u, p) => {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
      document.getElementById('login-form').dispatchEvent(new Event('submit'));
    };

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      const errDiv   = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');
      const btn      = document.getElementById('login-btn');
      const txt      = document.getElementById('login-btn-text');
      const icon     = document.getElementById('login-icon');

      errDiv.classList.add('hidden');
      btn.disabled = true;
      txt.textContent = 'Verifying Identity...';
      
      icon.setAttribute('data-lucide', 'loader-2');
      icon.classList.add('animate-spin');
      if (window.lucide) lucide.createIcons({ nodes: [btn] });

      try {
        const res = await API.login(username, password);
        // Ensure to remove spin
        const spinIcon = document.getElementById('login-icon');
        spinIcon.classList.remove('animate-spin');
        
        if (res.success && res.data) {
          const u = res.data;
          const session = {
            id: u.id, username: u.username, name: u.name, role: u.role,
            token: btoa(`${u.username}:${Date.now()}`),
            loginAt: new Date().toISOString(),
          };
          localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(session));
          
          btn.classList.remove('bg-slate-900', 'hover:bg-indigo-600');
          btn.classList.add('bg-emerald-500');
          txt.textContent = 'Connection Secured';
          spinIcon.setAttribute('data-lucide', 'check-circle-2');
          if (window.lucide) lucide.createIcons({ nodes: [btn] });
          
          setTimeout(() => window.location.replace('dashboard.html'), 600);
        } else {
          errDiv.classList.remove('hidden');
          errMsg.textContent = res.message || 'Invalid username or password.';
          btn.disabled = false; 
          txt.textContent = 'Establish Connection';
          spinIcon.setAttribute('data-lucide', 'arrow-right');
          if (window.lucide) lucide.createIcons({ nodes: [btn] });
        }
      } catch(err) {
        const spinIcon = document.getElementById('login-icon');
        spinIcon.classList.remove('animate-spin');
        errDiv.classList.remove('hidden');
        errMsg.textContent = 'Cannot reach API Server';
        btn.disabled = false; 
        txt.textContent = 'Establish Connection';
        spinIcon.setAttribute('data-lucide', 'arrow-right');
        if (window.lucide) lucide.createIcons({ nodes: [btn] });
      }
    });
  </script>
</body>
</html>
