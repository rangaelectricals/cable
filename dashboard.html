<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>RE CABLETRACK</title>
  
  <link rel="manifest" href="manifest.json" />

  <!-- Tailwind & UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Barcode & QR libs -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .page-enter { animation: fadeUp .22s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    
    /* Hide scrollbars for sidebars */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  </style>
</head>

<body class="bg-[#f3f4f6] min-h-screen text-slate-800">

  <!-- Desktop Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 sidebar-pattern shadow-2xl z-40 hidden md:flex flex-col transition-transform text-white animate-fadeIn" style="font-family: 'Inter', sans-serif;">
    <div class="px-6 py-8 border-b border-white/5 relative z-10 flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md p-2 flex items-center justify-center shadow-xl mb-4 group transition-all hover:scale-105">
        <i data-lucide="zap" class="w-8 h-8 text-white filter drop-shadow-md"></i>
      </div>
      <div class="text-center">
        <h1 class="text-[18px] font-black text-white tracking-tight leading-tight uppercase">CableTrack</h1>
        <p class="text-[9px] text-indigo-400 font-black uppercase tracking-[0.25em] mt-1 opacity-90">RANGA ELECTRICALS</p>
      </div>
    </div>

    <!-- Navigation items injected here by nav.js -->
    <nav class="mt-6 px-4 flex-1 overflow-y-auto relative z-10 custom-scrollbar" id="sidebar-content">
    </nav>

    <div class="p-4 sidebar-glass-footer relative z-10 mt-auto">
      <div class="flex items-center gap-3 p-3 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors cursor-pointer group">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-black text-lg shadow-lg group-hover:scale-110 transition-transform" id="sidebar-avatar">A</div>
        <div class="flex-1 min-w-0">
          <p id="sidebar-user-name" class="text-sm font-black text-white truncate leading-tight"></p>
          <p id="sidebar-user-role" class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider"></p>
        </div>
        <button onclick="Auth.logout()" class="text-gray-500 hover:text-red-400 transition-colors">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Mobile Drawer Overlay -->
  <div id="mobile-drawer-overlay" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden md:hidden transition-all duration-300 opacity-0 pointer-events-none">
    <aside id="mobile-drawer-aside" class="absolute top-0 left-0 h-full w-72 sidebar-pattern shadow-2xl text-white flex flex-col transform -translate-x-full transition-transform duration-300">
      <div class="flex items-center justify-between px-6 py-6 border-b border-white/5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-white/10 backdrop-blur-md p-1.5 flex items-center justify-center">
             <i data-lucide="zap" class="w-6 h-6 text-white"></i>
          </div>
          <div>
              <h1 class="text-lg font-black text-white tracking-tight leading-tight uppercase">CableTrack</h1>
              <p class="text-[8px] text-indigo-400 font-black uppercase tracking-wider">RANGA ELECTRICALS</p>
          </div>
        </div>
        <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white rounded-full bg-white/5" id="drawer-close">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <nav class="mt-6 px-4 flex-1 overflow-y-auto custom-scrollbar" id="drawer-content">
      </nav>
      
      <div class="p-4 sidebar-glass-footer mt-auto">
        <div class="flex items-center gap-3 p-3">
          <button onclick="Auth.logout()" class="btn btn-sm btn-outline text-white w-full border-white/20">
             <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Top Navigation Header -->
  <header class="fixed top-0 left-0 right-0 h-[64px] header-dark z-30 px-6 flex items-center justify-between shadow-sm" style="font-family: 'Inter', sans-serif;">
    <div class="flex items-center gap-3 pl-0 md:pl-64 transition-all h-full w-full basis-1/2">
      <button class="flex items-center justify-center p-1.5 rounded-md text-gray-400 hover:bg-white/10 md:hidden transition-colors" id="sidebar-toggle" aria-label="Open sidebar">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <div class="flex items-center gap-3">
        <span class="text-[17px] font-bold text-white tracking-tight" id="header-page-title">Dashboard</span>
      </div>
    </div>
    <nav class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div id="header-avatar" class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm shadow-sm ring-2 ring-white/10">A</div>
        <div class="hidden sm:flex flex-col items-start justify-center ml-1">
          <div class="flex items-center gap-1.5">
            <span id="header-user-name" class="text-sm font-semibold text-white leading-none">Admin</span>
            <span id="header-user-role-badge" class="bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded leading-none font-bold tracking-wider">ADMIN</span>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content Wrapper -->
  <main id="main-wrapper" class="pt-[64px] md:pl-64 transition-all min-h-screen bg-[#f3f4f6]">
    <div id="main-content" class="h-full p-4 md:p-8 w-full max-w-7xl mx-auto">
      <div class="flex items-center justify-center h-64">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    </div>
  </main>

  <!-- Toasts & Modals container -->
  <div id="toast-wrap" class="toast toast-top toast-end z-[100]"></div>
  <div id="modals"></div>
  <div id="loading-overlay" class="hidden fixed inset-0 bg-base-100/80 backdrop-blur-sm z-[200] flex items-center justify-center">
    <div class="flex flex-col items-center gap-3">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <span id="loading-text" class="text-sm text-base-content/60 font-medium">Loading…</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js?v=3.0"></script>
  <script src="js/utils/helpers.js?v=3.0"></script>
  <script src="js/utils/toast.js?v=3.0"></script>
  <script src="js/utils/loading.js?v=3.0"></script>
  <script src="js/utils/barcode.js?v=3.0"></script>
  <script src="js/auth.js?v=3.0"></script>
  <script src="js/api.js?v=3.0"></script>
  <script src="js/components/ui.js?v=3.0"></script>
  <script src="js/components/nav.js?v=3.0"></script>
  <script src="js/pages/dashboard.js?v=3.0"></script>
  <script src="js/pages/cables.js?v=3.0"></script>
  <script src="js/pages/specs.js?v=3.0"></script>
  <script src="js/pages/scan.js?v=3.0"></script>
  <script src="js/pages/logs-users.js?v=3.0"></script>
  <script src="js/pages/masters.js?v=3.0"></script>
  <script src="js/app.js?v=3.0"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Fill user details
    const user = Auth.getUser();
    if (!user) return;
    const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('header-avatar').textContent = initials;
    
    document.getElementById('sidebar-user-name').textContent = user.name;
    document.getElementById('sidebar-user-role').textContent = ROLE_LABELS[user.role] || user.role;
    
    document.getElementById('header-user-name').textContent = user.name;
    document.getElementById('header-user-role-badge').textContent = ROLE_LABELS[user.role] || user.role;

    // Intercept navigateTo
    const PAGE_LABELS = {
      dashboard: 'Dashboard', cables: 'Cable Inventory', specs: 'Inventory by Spec',
      scan: 'Scan Operations', masters: 'Masters', logs: 'Activity Logs', users: 'User Management',
    };
    const origNav = App.navigateTo.bind(App);
    App.navigateTo = async function(section) {
      // Close mobile drawer
      document.getElementById('mobile-drawer-overlay').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('mobile-drawer-aside').classList.add('-translate-x-full');
      
      const title = document.getElementById('header-page-title');
      if (title) title.textContent = PAGE_LABELS[section] || section;
      
      await origNav(section);
      if (window.lucide) lucide.createIcons();
    };

    // Mobile menu handlers
    const btnOpen = document.getElementById('sidebar-toggle');
    const btnClose = document.getElementById('drawer-close');
    const overlay = document.getElementById('mobile-drawer-overlay');
    const aside = document.getElementById('mobile-drawer-aside');

    btnOpen.addEventListener('click', () => {
      overlay.classList.remove('hidden', 'opacity-0', 'pointer-events-none');
      // small delay to allow display:block to apply before animation
      setTimeout(() => aside.classList.remove('-translate-x-full'), 10);
    });

    const closeDrawer = () => {
      aside.classList.add('-translate-x-full');
      overlay.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    };

    btnClose.addEventListener('click', closeDrawer);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeDrawer();
    });

    if (window.lucide) lucide.createIcons();
  });
  </script>
</body>
</html>
