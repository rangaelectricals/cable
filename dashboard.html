<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>RE CABLETRACK</title>
  
  <link rel="manifest" href="manifest.json" />

  <!-- Tailwind & UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Document Export & Scanning Libraries -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <link rel="stylesheet" href="css/styles.css?v=4.0" />

  <style>
    .animate-slideDown { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    
    .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Inline CSS Input & Search overrides for complete mobile responsiveness */
    input:not(label), select, textarea {
      background: #ffffff !important;
      border-radius: 0.75rem !important;
      border: 1.5px solid #cbd5e1 !important;
      color: #0f172a !important;
      font-weight: 500 !important;
      font-size: 16px !important;
      transition: all 0.2s ease-in-out !important;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5 !important;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12) !important;
      outline: none !important;
    }
    label.input {
      background: #ffffff !important;
      border-radius: 0.75rem !important;
      border: 1.5px solid #cbd5e1 !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 0.5rem !important;
      padding: 0 0.75rem !important;
      height: 2.5rem !important;
      transition: all 0.2s ease-in-out !important;
    }
    label.input:focus-within {
      border-color: #4f46e5 !important;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12) !important;
    }
    label.input input, .input-bordered input {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      padding: 0 !important;
      border-radius: 0 !important;
      font-size: 16px !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* Vibrant, highly distinguishable row and scenario highlighting */
    .row-status-godown {
      background-color: #ecfdf5 !important;
      border-left: 4px solid #10b981 !important;
    }
    .row-status-site {
      background-color: #fffbeb !important;
      border-left: 4px solid #f59e0b !important;
    }
    .row-status-godown:hover {
      background-color: #d1fae5 !important;
    }
    .row-status-site:hover {
      background-color: #fef3c7 !important;
    }

    .animate-fadeIn { animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* Hide scrollbars for sidebars */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  </style>
</head>

<body class="bg-[#f3f4f6] min-h-screen text-slate-800">

  <!-- Desktop Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 sidebar-pattern shadow-2xl z-40 hidden md:flex flex-col transition-transform text-white animate-fadeIn" style="font-family: 'Inter', sans-serif;">
    <div class="px-6 py-8 border-b border-white/5 relative z-10 flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md p-2 flex items-center justify-center shadow-xl mb-4 group transition-all hover:scale-105">
        <i data-lucide="zap" class="w-8 h-8 text-white filter drop-shadow-md"></i>
      </div>
      <div class="text-center">
        <h1 class="text-[18px] font-black text-white tracking-tight leading-tight uppercase">CableTrack</h1>
        <p class="text-[9px] text-indigo-400 font-black uppercase tracking-[0.25em] mt-1 opacity-90">RANGA ELECTRICALS</p>
      </div>
    </div>

    <!-- Navigation items injected here by nav.js -->
    <nav class="mt-6 px-4 flex-1 overflow-y-auto relative z-10 custom-scrollbar" id="sidebar-content">
    </nav>

    <div class="p-4 sidebar-glass-footer relative z-10 mt-auto">
      <div class="flex items-center gap-3 p-3 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors cursor-pointer group">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-black text-lg shadow-lg group-hover:scale-110 transition-transform" id="sidebar-avatar">A</div>
        <div class="flex-1 min-w-0">
          <p id="sidebar-user-name" class="text-sm font-black text-white truncate leading-tight"></p>
          <p id="sidebar-user-role" class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider"></p>
        </div>
        <button onclick="Auth.logout()" class="text-gray-500 hover:text-red-400 transition-colors">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Top Navigation Header -->
  <header class="fixed top-0 left-0 right-0 h-[64px] header-dark z-30 px-6 flex items-center justify-between shadow-sm" style="font-family: 'Inter', sans-serif;">
    <div class="flex items-center gap-3 pl-0 md:pl-64 transition-all h-full flex-1">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-white/10 backdrop-blur-md p-1.5 flex md:hidden items-center justify-center">
             <i data-lucide="zap" class="w-5 h-5 text-white"></i>
        </div>
        <span class="text-[17px] font-bold text-white tracking-tight" id="header-page-title">Dashboard</span>
      </div>

      <!-- Unified Command Search (Hidden on Mobile) -->
      <div class="hidden lg:flex items-center ml-8 flex-1 max-w-md">
        <div class="relative w-full group">
          <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-white transition-colors"></i>
          <input type="text" placeholder="Global Command Search (Ctrl+/)" 
            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-11 pr-4 py-2 text-xs font-bold text-white placeholder:text-slate-500 outline-none focus:bg-white/10 focus:border-indigo-500/50 transition-all" />
        </div>
      </div>
    </div>

    <nav class="flex items-center gap-2 sm:gap-4">
      <!-- Quick Info / Status Node -->
      <div class="hidden sm:flex items-center gap-3 mr-4">
        <div class="flex flex-col items-end">
          <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Link Security</span>
          <span class="text-[10px] font-bold text-emerald-400 leading-none">AES-256</span>
        </div>
        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
      </div>

      <!-- Action Node Group -->
      <div class="flex items-center gap-1 sm:gap-2 mr-2 sm:mr-4 border-r border-white/10 pr-2 sm:pr-4">
        <button class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/5 transition-all relative group">
          <i data-lucide="bell" class="w-4.5 h-4.5"></i>
          <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#0f172a] animate-bounce"></span>
          <div class="absolute top-full right-0 mt-2 w-48 bg-white rounded-2xl shadow-2xl p-4 hidden group-hover:block animate-slideDown">
            <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest mb-2 border-b pb-2">Recent Alerts</p>
            <p class="text-[10px] text-slate-400 italic">No critical exceptions...</p>
          </div>
        </button>
        <button class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/5 transition-all">
          <i data-lucide="help-circle" class="w-4.5 h-4.5"></i>
        </button>
      </div>

      <div class="flex items-center gap-2">
        <div id="header-avatar" class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-black text-sm shadow-sm ring-2 ring-white/10">A</div>
        <div class="hidden sm:flex flex-col items-start justify-center ml-1">
          <div class="flex items-center gap-1.5">
            <span id="header-user-name" class="text-sm font-semibold text-white leading-none">Admin</span>
            <span id="header-user-role-badge" class="bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded leading-none font-bold tracking-wider uppercase">ADMIN</span>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content Wrapper -->
  <main id="main-wrapper" class="pt-[64px] pb-[80px] md:pb-0 md:pl-64 transition-all min-h-screen bg-[#f3f4f6]">
    <div id="main-content" class="h-full p-2 md:p-8 w-full max-w-7xl mx-auto">
      <div class="flex items-center justify-center h-64">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    </div>
  </main>

  <!-- Mobile Bottom Navigation (Super Premium Design) -->
  <nav class="mobile-bottom-nav md:hidden fixed bottom-0 left-0 right-0 z-40 bg-[#0f172a]/95 backdrop-blur-xl border-t border-white/5 shadow-[0_-8px_40px_-10px_rgba(0,0,0,0.6)]">
    <!-- Active Indicator Bar -->
    <div id="bottom-nav-indicator" class="absolute top-0 h-[4px] bg-gradient-to-r from-indigo-500 to-blue-500 shadow-[0_0_15px_rgba(99,102,241,0.9)] transition-all duration-300 ease-out" style="width: 20%; left: 0%; border-radius: 0 0 4px 4px;"></div>
    
    <div id="bottom-nav-content" class="flex items-center justify-around h-[75px] px-2 relative z-10">
      <!-- Rendered by JS -->
    </div>
  </nav>

  <!-- Quick Action FAB (Desktop) -->
  <div class="hidden lg:flex fixed bottom-8 right-8 z-[100] flex-col items-end gap-4">
    <div id="fab-menu" class="hidden flex-col items-end gap-3 mb-4 animate-slideUp">
      <button onclick="App.navigateTo('scan')" class="flex items-center gap-3 px-5 py-3 bg-white rounded-2xl shadow-2xl border border-slate-100 group hover:bg-slate-900 transition-all">
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 group-hover:text-white">Quick Scan</span>
        <div class="w-10 h-10 rounded-xl bg-indigo-500 text-white flex items-center justify-center shadow-lg"><i data-lucide="scan-line" class="w-5 h-5"></i></div>
      </button>
      <button onclick="App.navigateTo('cables')" class="flex items-center gap-3 px-5 py-3 bg-white rounded-2xl shadow-2xl border border-slate-100 group hover:bg-slate-900 transition-all">
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 group-hover:text-white">Add Inventory</span>
        <div class="w-10 h-10 rounded-xl bg-emerald-500 text-white flex items-center justify-center shadow-lg"><i data-lucide="plus" class="w-5 h-5"></i></div>
      </button>
    </div>
    <button onclick="document.getElementById('fab-menu').classList.toggle('hidden')" 
      class="w-16 h-16 rounded-[2rem] bg-slate-900 text-white flex items-center justify-center shadow-[0_20px_50px_rgba(15,23,42,0.4)] hover:scale-110 active:scale-95 transition-all ring-4 ring-white">
      <i data-lucide="layers" class="w-7 h-7"></i>
    </button>
  </div>

  <!-- Toasts & Modals container -->
  <div id="toast-wrap" class="toast toast-top toast-end z-[100]"></div>
  <div id="modals"></div>
  <div id="loading-overlay" class="hidden fixed inset-0 bg-white/90 backdrop-blur-sm z-[200] flex items-center justify-center">
    <div class="flex flex-col items-center gap-3">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <span id="loading-text" class="text-sm text-slate-500 font-medium">Loading…</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js?v=4.0"></script>
  <script src="js/utils/helpers.js?v=4.0"></script>
  <script src="js/utils/toast.js?v=4.0"></script>
  <script src="js/utils/loading.js?v=4.0"></script>
  <script src="js/utils/barcode.js?v=4.0"></script>
  <script src="js/auth.js?v=4.0"></script>
  <script src="js/api.js?v=4.0"></script>
  <script src="js/components/ui.js?v=4.0"></script>
  <script src="js/components/nav.js?v=4.0"></script>
  <script src="js/pages/dashboard.js?v=4.0"></script>
  <script src="js/pages/cables.js?v=4.0"></script>
  <script src="js/pages/specs.js?v=4.0"></script>
  <script src="js/pages/spec-details.js?v=4.0"></script>
  <script src="js/pages/scan.js?v=4.0"></script>
  <script src="js/pages/logs-users.js?v=4.0"></script>
  <script src="js/pages/masters.js?v=4.0"></script>
  <script src="js/app.js?v=4.0"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Fill user details
    const user = Auth.getUser();
    if (!user) return;
    const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('header-avatar').textContent = initials;
    
    document.getElementById('sidebar-user-name').textContent = user.name;
    document.getElementById('sidebar-user-role').textContent = ROLE_LABELS[user.role] || user.role;
    
    document.getElementById('header-user-name').textContent = user.name;
    document.getElementById('header-user-role-badge').textContent = ROLE_LABELS[user.role] || user.role;

    // Intercept navigateTo
     const PAGE_LABELS = {
       dashboard: 'Dashboard', cables: 'Cable Inventory', specs: 'Inventory by Spec',
       'spec-details': 'Specification Details',
       scan: 'Scan Operations', masters: 'Masters', logs: 'Activity Logs', users: 'User Management',
     };
    const origNav = App.navigateTo.bind(App);
    App.navigateTo = async function(section) {
      const title = document.getElementById('header-page-title');
      if (title) title.textContent = PAGE_LABELS[section] || section;
      
      await origNav(section);
      if (window.lucide) lucide.createIcons();
    };

    if (window.lucide) lucide.createIcons();
  });
  </script>
</body>
</html>
